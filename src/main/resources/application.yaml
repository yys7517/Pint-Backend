spring:
  application:
    name: pint-backend

  datasource:
    url: jdbc:postgresql://pint-postgres:5432/pintdb
    username: pintadmin
    password: pintpass

  data:
    redis:
      host: pint-redis
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true



  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB