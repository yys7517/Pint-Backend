spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: pint-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST_NAME}:5432/${PSQL_DB}
    username: ${DB_USER}
    password: ${DB_PWD}

  data:
    redis:
      host: ${REDIS_HOST_NAME}
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

cloud:
  aws:
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${AWS_S3_BUCKET}