spring:
  application:
    name: pint-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/pintdb
    username: pintadmin
    password: pintpass

  data:
    redis:
      host: pint-redis
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

cloud:
  aws:
    credentials:
      access-key:
      secret-key:
    region:
      static: ap-northeast-2
    s3:
      bucket: pint-bucket1