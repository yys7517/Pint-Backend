spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: pint-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST_NAME}:5432/${PSQL_DB}
    username: ${DB_USER}
    password: ${DB_PWD}

  data:
    redis:
      host: ${REDIS_HOST_NAME}
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB

server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        same-site: ${SESSION_COOKIE_SAME_SITE:Lax}
        secure: ${SESSION_COOKIE_SECURE:false}
        http-only: true

cloud:
  aws:
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${AWS_S3_BUCKET}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}
