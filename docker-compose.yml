services:

  postgres:
    image: postgres:15
    container_name: pint-postgres
    restart: always
    environment:
      POSTGRES_DB: ${PSQL_DB}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PWD}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - pint-postgres-data:/var/lib/postgresql/data



  redis:
    image: redis:7
    container_name: ${REDIS_HOST_NAME}
    restart: always
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Seoul

  app:
    build: .
    container_name: pint-app
    depends_on:
      - postgres
      - redis
    environment:
      TZ: Asia/Seoul
    env_file:
      - .env

    ports:
      - "8080:8080"

volumes:
  pint-postgres-data: